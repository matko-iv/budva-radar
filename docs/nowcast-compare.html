<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKALA NOWCAST — DGMR</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="vendor/leaflet.css">
<style>
  #map { height: 70vh; min-height: 360px; width: 100%;
         border: 1px solid #ddd; border-radius: 4px; background: #eef1f4; }
  .radar-ovl { image-rendering: pixelated; }
  .budva-lbl { background: transparent; border: 0; box-shadow: none; padding: 0;
               color: #b00; font: 600 12px/1 inter, system-ui, sans-serif;
               text-shadow: 0 0 3px #fff, 0 0 3px #fff; }
  .budva-lbl::before { display: none; }
  #controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
              margin: 0 0 10px; font-size: 13px; }
  #controls button { font: inherit; padding: 3px 10px; border: 1px solid #ccc;
                     border-radius: 4px; background: #fff; cursor: pointer; }
  #controls button:hover { background: #f0f0f0; }
  .legend i { display:inline-block; width:11px; height:11px; margin: 0 2px 0 6px;
              vertical-align: middle; }
</style>
</head>
<body>

<header>
  <h1>matkov-SKALA-sistem</h1>
  <p style="font-size:13px; margin:0 0 6px;">
    <a href="index.html">home</a> · <a href="radar-map.html">SKALA RAIN</a> ·
    <a href="cloud-map.html">SKALA CLOUD</a> · <span style="color:#888;">SKALA NOWCAST</span>
  </p>
  <p id="generated"></p>
</header>

<main>
  <section>
    <h2>SKALA NOWCAST — DGMR (DeepMind)</h2>
    <div id="controls" style="display:none">
      <button id="play" type="button">▶</button>
      <input id="slider" type="range" min="0" max="0" value="0" step="1">
      <b><span id="lead">sada</span></b>
      <span class="legend" id="legend"></span>
    </div>
    <div id="map"></div>
  </section>

  <section>
    <h2>Padavine nad Budvom (mm/h) po vremenu</h2>
    <table id="seriestab"></table>
  </section>
</main>

<footer>
  <p id="meta"></p>
  <p>SKALA NOWCAST · <a href="nowcast-compare.legacy.html">poređenje svih modela
     (LINDA / ekstrapolacija / DGMR)</a></p>
</footer>

<script src="vendor/leaflet.js"></script>
<script src="compare_data.js"></script>
<script src="skala-r2.js"></script>
<script>
// Pull the freshest COMPARE_DATA from R2 (compare_data.js is the Pages fallback).
SKALA_R2.boot('compare.json', 'COMPARE_DATA', function () {
  var D = window.COMPARE_DATA || {};
  function el(id){ return document.getElementById(id); }
  function f1(x){ return x == null ? "?" : Number(x).toFixed(1); }
  var STOPS = [[0.2,"#96c8ff"],[1,"#4682eb"],[2.5,"#28be6e"],[5,"#ebe137"],
               [10,"#f5962a"],[20,"#e64128"],[50,"#af28b4"]];

  if (!D.ok) {
    el("generated").textContent = "Nedostupno: " + (D.error || "pokreni compare_nowcast.py");
    return;
  }

  var M = D.map_meta || {};
  var models = D.models || [];
  var dgmr = null;
  for (var i = 0; i < models.length; i++) { if (models[i].key === "dgmr") dgmr = models[i]; }

  el("generated").textContent = "generisano " + (D.generated || "?");
  el("meta").textContent = "Izvor: ORD ODIM (1 km) · scenario: " + D.scenario +
    " · korak " + D.timestep_min + " min · " + D.n_frames + " kadra" +
    (D.demo ? "  ·  DEMO (sintetička ćelija)" : "");

  if (!dgmr || !dgmr.frames || !dgmr.frames.length) {
    el("map").innerHTML = "<div style='padding:14px; font-size:13px;'>DGMR nije aktivan u " +
      "compare_data.js" + (dgmr && dgmr.reason ? (" — " + dgmr.reason) : "") +
      ".<br>Pokreni: <code>python compare_nowcast.py --h5 data/ord_archive</code></div>";
    return;
  }

  // ---- map: DGMR forecast over the no-label relief, Budva centred ----
  var nw = M.corner_nw, se = M.corner_se;          // [lat, lon]
  var bounds = [[se[0], nw[1]], [nw[0], se[1]]];    // [[S,W],[N,E]]  (full DGMR tile extent)
  // Open ZOOMED IN on Budva (~±50 km) instead of the whole ~256 km tile; the user
  // can still zoom out. The overlays keep the full-tile bounds.
  var view = bounds;
  if (M.budva_latlon) {
    var bLa = M.budva_latlon[0], bLo = M.budva_latlon[1];
    view = [[bLa - 0.45, bLo - 0.60], [bLa + 0.45, bLo + 0.60]];
  }
  var map = L.map("map", { attributionControl: true }).fitBounds(view);
  // Live Esri World Shaded Relief tiles (no labels): sharp at every zoom, so the
  // relief stays crisp zoomed in on Budva. (The baked PNG blurred when zoomed and
  // the high-res export could come back blank/grey — so live tiles are used here.)
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}",
    { maxNativeZoom: 13, maxZoom: 18, attribution: "Relief: Esri" }).addTo(map);
  var overlay = L.imageOverlay(SKALA_R2.url(dgmr.frames[0].image), bounds,
    { opacity: 0.8, className: "radar-ovl" }).addTo(map);
  if (M.budva_latlon) {
    L.circleMarker(M.budva_latlon, { radius: 5, color: "#fff", weight: 2,
      fillColor: "#d00", fillOpacity: 1 }).addTo(map)
      .bindTooltip("Budva", { permanent: true, direction: "right", className: "budva-lbl" });
  }
  setTimeout(function () { map.invalidateSize(); map.fitBounds(view); }, 60);

  // ---- time control + wall-clock (local) labels ----
  function clock(leadMin) {
    if (!D.base_epoch_ms) return "";
    var t = new Date(D.base_epoch_ms + leadMin * 60000);
    return ("0" + t.getHours()).slice(-2) + ":" + ("0" + t.getMinutes()).slice(-2);
  }
  var frames = dgmr.frames, nlead = frames.length;
  var sl = el("slider"); sl.max = nlead - 1;
  el("controls").style.display = "";
  el("legend").innerHTML = " mm/h: " + STOPS.map(function (s) {
    return "<i style='background:" + s[1] + "'></i>" + s[0]; }).join(" ") +
    (D.base_epoch_ms ? " &nbsp;·&nbsp; <small>sat = lokalno vrijeme</small>" : "");
  function draw(i) {
    var fr = frames[i];
    overlay.setUrl(SKALA_R2.url(fr.image));
    var hhmm = clock(fr.lead_min);
    el("lead").textContent = (fr.is_now ? "sada" : ("+" + fr.lead_min + " min")) +
      (hhmm ? " · " + hhmm : "");
  }
  var timer = null;
  function setPlay(on) {
    var b = el("play");
    if (on) { b.textContent = "⏸"; timer = setInterval(function () {
      var i = (+sl.value + 1) % nlead; sl.value = i; draw(i); }, 700); }
    else { b.textContent = "▶"; if (timer) { clearInterval(timer); timer = null; } }
  }
  sl.addEventListener("input", function () { setPlay(false); draw(+sl.value); });
  el("play").onclick = function () { setPlay(!timer); };
  draw(0);

  // ---- number table: +min | disk-max (≤8 km) | exact point ----
  var rows = (dgmr.series || []).map(function (s) {
    return "<tr><td>+" + s.lead_min + "</td><td>" + f1(s.disc_max_mmh) +
           "</td><td>" + f1(s.point_mmh) + "</td></tr>";
  }).join("");
  el("seriestab").innerHTML =
    "<tr><th>+min</th><th>disk-max mm/h (≤8 km)</th><th>tačka mm/h</th></tr>" + rows;
});
</script>
</body>
</html>
